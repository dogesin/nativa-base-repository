version: '3.8'

services:
  frontend:
    # Nombre del contenedor dinámico
    container_name: ${FRONTEND_CONTAINER_NAME:-frontend}
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      # Puerto del host dinámico : Puerto interno fijo
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app:delegated
      - habitables_frontend_node_modules:/app/node_modules
      - habitables_frontend_next:/app/.next
    environment:
      - NODE_ENV=development
    user: "0:0"
    command: sh -c "npm install && npm run dev"
    networks:
      - habitables_network

  backend:
    container_name: ${BACKEND_CONTAINER_NAME:-backend}
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --reload
    networks:
      - habitables_network

  postgres:
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres}
    image: postgres:15-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - habitables_network

networks:
  habitables_network:
    driver: bridge

volumes:
  habitables_frontend_node_modules:
  habitables_frontend_next:
  postgres-data:
